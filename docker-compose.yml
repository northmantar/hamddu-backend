networks:
  hamddu-net:
    driver: bridge

volumes:
  app_postgres_data:
  app_redis_data:
  infisical_postgres_data:
  infisical_redis_data:

services:

  # ─── App PostgreSQL ─────────────────────────────────────────────
  app-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hamddu-net]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-hamddu}
      POSTGRES_USER: ${APP_DB_USER:-hamddu}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-hamddu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── App Redis ──────────────────────────────────────────────────
  app-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hamddu-net]
    volumes:
      - app_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Infisical PostgreSQL ────────────────────────────────────────
  infisical-postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    networks: [hamddu-net]
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD}
    volumes:
      - infisical_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Infisical Redis ─────────────────────────────────────────────
  infisical-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hamddu-net]
    volumes:
      - infisical_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mailhog (catches Infisical verification emails) ─────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks: [hamddu-net]
    ports:
      - "8025:8025"   # Web UI: open http://localhost:8025 to read emails

  # ─── Infisical ───────────────────────────────────────────────────
  infisical:
    image: infisical/infisical:latest-postgres
    restart: unless-stopped
    networks: [hamddu-net]
    ports:
      - "80:8080"
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      DB_CONNECTION_URI: postgresql://infisical:${INFISICAL_DB_PASSWORD}@infisical-postgres:5432/infisical
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: http://localhost:80
      TELEMETRY_ENABLED: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM_ADDRESS: infisical@hamddu.local
      SMTP_FROM_NAME: Infisical
      SMTP_IGNORE_TLS: "true"
      SMTP_REQUIRE_TLS: "false"
    depends_on:
      infisical-postgres:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ─── NestJS Application + Admin Dashboard (PM2) ─────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    networks: [hamddu-net]
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3000:3000"   # API server
      - "4000:4000"   # Admin dashboard (Next.js)
    environment:
      INFISICAL_SITE_URL: http://infisical:8080
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENVIRONMENT: ${INFISICAL_ENVIRONMENT:-production}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      INFISICAL_ACCESS_TOKEN: ${INFISICAL_ACCESS_TOKEN:-}
    depends_on:
      app-postgres:
        condition: service_healthy
      app-redis:
        condition: service_healthy
      infisical:
        condition: service_healthy
