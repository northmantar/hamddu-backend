<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamddu Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #4f46e5; }
    .field input.error { border-color: #ff4d4f; }

    /* Config */
    .config { margin-bottom: 24px; }
    .config label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    .config input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      color: #888;
    }
    .config input:focus { border-color: #4f46e5; color: #333; }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-danger   { background: #ff4d4f; color: #fff; }
    .btn-ghost    { background: #f5f5f5; color: #333; }
    .btn-warning  { background: #fa8c16; color: #fff; }

    .btn-sm {
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 7px;
      width: auto;
      margin-top: 0;
    }

    /* Error message */
    .err-msg {
      display: none;
      font-size: 13px;
      color: #ff4d4f;
      margin-top: 10px;
      padding: 10px 14px;
      background: #fff0f0;
      border-radius: 8px;
    }
    .err-msg.show { display: block; }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .badge.ok      { background: #e6f9ee; color: #09b44d; }
    .badge.admin   { background: #ede9fe; color: #4f46e5; }
    .badge.info    { background: #eff3ff; color: #4f46e5; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 16px;
      color: #bbb; font-size: 12px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }

    /* Result panel */
    .result {
      margin-top: 16px;
      background: #f9f9f9;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #eee;
    }
    .result-header {
      padding: 9px 14px;
      background: #f0f0f0;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-body {
      padding: 12px 14px;
      font-size: 12px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      color: #333;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Copy button */
    .copy-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #555;
    }
    .copy-btn:hover { background: #f0f0f0; }

    /* User info row */
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 14px 16px;
      background: #fafafe;
      border: 1px solid #ede9fe;
      border-radius: 10px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-email { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta  { font-size: 11px; color: #888; margin-top: 2px; }

    /* Action grid */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="card" id="app"></div>
<div id="toast"></div>

<script>
  // ─── Config ──────────────────────────────────────────────────────
  const DEFAULT_API = 'http://localhost:3000';
  let apiBase = localStorage.getItem('admin_api_base') || DEFAULT_API;
  let accessToken = null;
  let currentUser = null;

  // ─── Helpers ─────────────────────────────────────────────────────
  const app = document.getElementById('app');
  const $ = id => document.getElementById(id);

  function toast(msg, duration = 2500) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text)
      .then(() => toast('복사됨!'))
      .catch(() => toast('복사 실패'));
  }

  function formatJwt(token) {
    try {
      const [, payload] = token.split('.');
      return JSON.stringify(JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/'))), null, 2);
    } catch { return '(decode 실패)'; }
  }

  async function api(method, path, body, auth = false) {
    const headers = { 'Content-Type': 'application/json' };
    if (auth && accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    const res = await fetch(`${apiBase}/api${path}`, {
      method,
      headers,
      credentials: 'include',
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  // ─── Views ───────────────────────────────────────────────────────

  function renderLogin(prefillEmail = '') {
    app.innerHTML = `
      <h1>어드민 로그인</h1>
      <p class="subtitle">Hamddu 어드민 페이지</p>

      <div class="config">
        <label>API Base URL</label>
        <input id="api-input" type="text" value="${apiBase}" placeholder="http://localhost:3000" />
      </div>

      <div class="field">
        <label>이메일</label>
        <input id="email" type="email" placeholder="admin@example.com" value="${prefillEmail}" autocomplete="email" />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력" autocomplete="current-password" />
      </div>

      <div class="err-msg" id="err-msg"></div>

      <button class="btn btn-primary" id="btn-login">로그인</button>
    `;

    $('api-input').addEventListener('change', e => {
      apiBase = e.target.value.replace(/\/$/, '');
      localStorage.setItem('admin_api_base', apiBase);
    });

    $('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    $('btn-login').addEventListener('click', doLogin);
  }

  function renderSetPassword(token, user) {
    accessToken = token;
    currentUser = user;
    app.innerHTML = `
      <h1>비밀번호 설정</h1>
      <p class="subtitle">어드민 비밀번호를 최초 설정합니다</p>

      <div class="field">
        <label>새 비밀번호 <span style="color:#888;font-weight:400">(8자 이상)</span></label>
        <input id="new-pw" type="password" placeholder="새 비밀번호 입력" />
      </div>

      <div class="err-msg" id="err-msg"></div>

      <button class="btn btn-primary" id="btn-set">비밀번호 설정</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="renderLogin('${user?.email || ''}')">돌아가기</button>
    `;

    $('new-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doSetPassword(); });
    $('btn-set').addEventListener('click', doSetPassword);
  }

  function renderDashboard() {
    const email = currentUser?.email || '';
    const initial = email.charAt(0).toUpperCase() || 'A';

    app.innerHTML = `
      <h1>어드민 대시보드</h1>
      <p class="subtitle">로그인 성공 — 토큰 및 API 테스트</p>

      <div class="user-row">
        <div class="user-avatar">${initial}</div>
        <div class="user-info">
          <div class="user-email">${email}</div>
          <div class="user-meta">
            <span class="badge admin">ADMIN</span>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="doLogout()">로그아웃</button>
      </div>

      <div class="result">
        <div class="result-header">
          Access Token
          <button class="copy-btn" onclick="copyText(accessToken)">Copy</button>
        </div>
        <div class="result-body" id="raw-token">${accessToken}</div>
      </div>

      <div class="result" style="margin-top:8px">
        <div class="result-header">JWT Payload <span class="badge info">client-side decode</span></div>
        <div class="result-body">${formatJwt(accessToken)}</div>
      </div>

      <div class="divider">API 테스트</div>

      <div class="actions">
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="testGetUsers()">GET /users</button>
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="testGetCategories()">GET /boards/categories</button>
        <button class="btn btn-warning btn-sm" style="width:100%;grid-column:1/-1" onclick="renderChangePassword()">비밀번호 변경</button>
      </div>

      <div class="result" id="api-result" style="display:none;margin-top:16px">
        <div class="result-header" id="api-result-label">응답</div>
        <div class="result-body"  id="api-result-body"></div>
      </div>
    `;
  }

  function renderChangePassword() {
    app.innerHTML = `
      <h1>비밀번호 변경</h1>
      <p class="subtitle">어드민 비밀번호를 변경합니다</p>

      <div class="field">
        <label>현재 비밀번호</label>
        <input id="cur-pw" type="password" placeholder="현재 비밀번호" autocomplete="current-password" />
      </div>
      <div class="field">
        <label>새 비밀번호 <span style="color:#888;font-weight:400">(8자 이상)</span></label>
        <input id="new-pw" type="password" placeholder="새 비밀번호" autocomplete="new-password" />
      </div>

      <div class="err-msg" id="err-msg"></div>

      <button class="btn btn-primary" id="btn-change">변경</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="renderDashboard()">돌아가기</button>
    `;

    $('new-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doChangePassword(); });
    $('btn-change').addEventListener('click', doChangePassword);
  }

  // ─── API Actions ─────────────────────────────────────────────────

  async function doLogin() {
    const email    = $('email').value.trim();
    const password = $('password').value;
    const errEl    = $('err-msg');
    const btn      = $('btn-login');

    if (!email || !password) {
      showErr(errEl, '이메일과 비밀번호를 입력해주세요.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '로그인 중…';
    errEl.classList.remove('show');

    const { ok, status, data } = await api('POST', '/auth/admin/login', { email, password });

    btn.disabled = false;
    btn.textContent = '로그인';

    if (ok) {
      accessToken = data.accessToken;
      currentUser = data.user;
      renderDashboard();
    } else if (status === 400 && data.message?.includes('비밀번호가 설정되지 않았습니다')) {
      // First login — need to set password; get token via a temp flow
      // We can't get a token without password, so show set-password with guidance
      showErr(errEl, '비밀번호가 설정되지 않았습니다. 아래 안내를 참고하세요.');
      // Provide instructions — user needs an access token from OAuth first
      showErr(errEl, '비밀번호가 설정되지 않았습니다.\n먼저 OAuth로 로그인해 발급받은 토큰으로 /auth/admin/set-password를 호출하세요.');
    } else {
      showErr(errEl, data.message || `오류: ${status}`);
    }
  }

  async function doSetPassword() {
    const password = $('new-pw').value;
    const errEl    = $('err-msg');
    const btn      = $('btn-set');

    if (!password || password.length < 8) {
      showErr(errEl, '비밀번호는 8자 이상이어야 합니다.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '설정 중…';

    const { ok, status, data } = await api('POST', '/auth/admin/set-password', { password }, true);

    btn.disabled = false;
    btn.textContent = '비밀번호 설정';

    if (ok) {
      toast('비밀번호가 설정되었습니다.');
      renderDashboard();
    } else {
      showErr(errEl, data.message || `오류: ${status}`);
    }
  }

  async function doChangePassword() {
    const currentPassword = $('cur-pw').value;
    const newPassword     = $('new-pw').value;
    const errEl           = $('err-msg');
    const btn             = $('btn-change');

    if (!currentPassword || !newPassword) {
      showErr(errEl, '모든 필드를 입력해주세요.');
      return;
    }
    if (newPassword.length < 8) {
      showErr(errEl, '새 비밀번호는 8자 이상이어야 합니다.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '변경 중…';

    const { ok, status, data } = await api('PATCH', '/auth/admin/change-password', { currentPassword, newPassword }, true);

    btn.disabled = false;
    btn.textContent = '변경';

    if (ok) {
      toast('비밀번호가 변경되었습니다.');
      renderDashboard();
    } else {
      showErr(errEl, data.message || `오류: ${status}`);
    }
  }

  async function doLogout() {
    await api('POST', '/auth/logout', null, true).catch(() => {});
    accessToken = null;
    currentUser = null;
    renderLogin();
  }

  async function testGetUsers() {
    showApiResult('GET /api/users', '불러오는 중…');
    const { ok, status, data } = await api('GET', '/users', null, true);
    showApiResult('GET /api/users', ok ? JSON.stringify(data, null, 2) : `${status}\n${JSON.stringify(data, null, 2)}`);
  }

  async function testGetCategories() {
    showApiResult('GET /api/boards/categories', '불러오는 중…');
    const { ok, status, data } = await api('GET', '/boards/categories', null, true);
    showApiResult('GET /api/boards/categories', ok ? JSON.stringify(data, null, 2) : `${status}\n${JSON.stringify(data, null, 2)}`);
  }

  // ─── Helpers ─────────────────────────────────────────────────────

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  function showApiResult(label, body) {
    const el = $('api-result');
    if (!el) return;
    el.style.display = 'block';
    $('api-result-label').textContent = label;
    $('api-result-body').textContent = body;
  }

  // ─── Init ────────────────────────────────────────────────────────
  renderLogin();
</script>
</body>
</html>
