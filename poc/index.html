<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamddu Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

    /* ── Login ────────────────────────────────── */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 44px; box-shadow: 0 4px 24px rgba(0,0,0,.10); width: 100%; max-width: 400px; }
    .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-card p { font-size: 14px; color: #888; margin-bottom: 28px; }

    /* ── Layout ───────────────────────────────── */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 224px; background: #18181b; color: #fff; flex-shrink: 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
    .sb-head { padding: 22px 20px 18px; border-bottom: 1px solid #27272a; }
    .sb-head h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .sb-head .sb-user { font-size: 12px; color: #71717a; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
    .sb-group { font-size: 10px; font-weight: 600; color: #52525b; padding: 14px 16px 4px; text-transform: uppercase; letter-spacing: .6px; }
    .nav-btn { display: block; width: 100%; padding: 9px 16px; background: none; border: none; color: #a1a1aa; text-align: left; cursor: pointer; font-size: 13.5px; border-left: 3px solid transparent; transition: all .12s; }
    .nav-btn:hover { color: #fff; background: #27272a; }
    .nav-btn.active { color: #fff; background: #27272a; border-left-color: #6366f1; }
    .sb-foot { padding: 14px 16px; border-top: 1px solid #27272a; }
    .main { margin-left: 224px; padding: 32px 36px; min-height: 100vh; flex: 1; }

    /* ── Section ──────────────────────────────── */
    .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .sec-title { font-size: 20px; font-weight: 700; }

    /* ── Buttons ──────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 500; transition: opacity .13s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary  { background: #6366f1; color: #fff; }
    .btn-danger   { background: #ef4444; color: #fff; }
    .btn-ghost    { background: #f4f4f5; color: #333; }
    .btn-warning  { background: #f59e0b; color: #fff; }
    .btn-full     { width: 100%; padding: 11px 16px; font-size: 15px; font-weight: 600; }
    .btn-sm       { padding: 5px 11px; font-size: 12px; border-radius: 6px; }

    /* ── Form ─────────────────────────────────── */
    .form-card { background: #fff; border-radius: 12px; padding: 22px 24px; box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 20px; }
    .form-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .form-row { display: grid; gap: 14px; margin-bottom: 14px; }
    .form-row.col-2 { grid-template-columns: 1fr 1fr; }
    .form-row.col-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 600; color: #555; }
    .field input, .field select, .field textarea {
      padding: 8px 11px; border: 1px solid #e4e4e7; border-radius: 7px; font-size: 13.5px;
      outline: none; transition: border-color .15s; font-family: inherit; background: #fff;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #6366f1; }
    .check-field { display: flex; align-items: center; gap: 7px; font-size: 13.5px; padding-top: 22px; }
    .check-field input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #6366f1; }
    .form-actions { display: flex; gap: 8px; margin-top: 18px; }
    .err-msg { font-size: 12.5px; color: #ef4444; margin-top: 8px; display: none; }
    .err-msg.show { display: block; }

    /* ── Table ────────────────────────────────── */
    .table-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #fafafa; padding: 11px 14px; text-align: left; font-size: 11.5px; font-weight: 600; color: #666; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tbody td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f7f7f7; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    .td-mono { font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; color: #888; }
    .td-actions { display: flex; gap: 6px; white-space: nowrap; }
    .empty-row { text-align: center; padding: 40px 0; color: #aaa; font-size: 13px; }

    /* ── Badge ────────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
    .badge-admin    { background: #ede9fe; color: #5b21b6; }
    .badge-member   { background: #f0fdf4; color: #166534; }
    .badge-on       { background: #f0fdf4; color: #166534; }
    .badge-off      { background: #fef2f2; color: #991b1b; }
    .badge-enabled  { background: #f0fdf4; color: #166534; }
    .badge-disabled { background: #fef2f2; color: #991b1b; }

    /* ── Pagination ───────────────────────────── */
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 14px; font-size: 13px; color: #666; }

    /* ── Toast ────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: #18181b; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 13.5px; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err  { background: #b91c1c; }
  </style>
</head>
<body>

<!-- ─── Login ─────────────────────────────────────────────────────── -->
<div id="view-login" class="login-wrap">
  <div class="login-card">
    <h1>Hamddu Admin</h1>
    <p>관리자 로그인</p>
    <div class="field" style="margin-bottom:12px">
      <label>API 서버</label>
      <input id="api-url" value="http://localhost:3000/api" />
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>이메일</label>
      <input id="l-email" type="email" placeholder="admin@example.com" />
    </div>
    <div class="field" style="margin-bottom:6px">
      <label>비밀번호</label>
      <input id="l-pw" type="password" placeholder="비밀번호" />
    </div>
    <div id="l-err" class="err-msg"></div>
    <button id="l-btn" class="btn btn-primary btn-full" style="margin-top:16px" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ─── App ───────────────────────────────────────────────────────── -->
<div id="view-app" hidden>
  <aside class="sidebar">
    <div class="sb-head">
      <h1>Hamddu Admin</h1>
      <div class="sb-user" id="sb-user"></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-group">슈퍼유저</div>
      <button class="nav-btn" data-sec="users"      onclick="nav('users')">유저 관리</button>
      <div class="sb-group">어드민</div>
      <button class="nav-btn" data-sec="channels"   onclick="nav('channels')">채널 관리</button>
      <button class="nav-btn" data-sec="contents"   onclick="nav('contents')">콘텐츠 관리</button>
      <button class="nav-btn" data-sec="categories" onclick="nav('categories')">카테고리 관리</button>
      <button class="nav-btn" data-sec="points"     onclick="nav('points')">포인트 정책</button>
      <button class="nav-btn" data-sec="xp"         onclick="nav('xp')">XP 레벨 정책</button>
      <div class="sb-group">계정</div>
      <button class="nav-btn" data-sec="password"   onclick="nav('password')">비밀번호 변경</button>
    </nav>
    <div class="sb-foot">
      <button class="btn btn-ghost btn-full" style="font-size:13px" onclick="doLogout()">로그아웃</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div id="toast"></div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────
let token = null;
let me = null;
let channelCache = [];

// ─── Helpers ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const apiBase = () => ($('api-url')?.value || 'http://localhost:3000/api').replace(/\/$/, '');

function h(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(method, path, body, auth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(apiBase() + path, {
      method, headers, credentials: 'include',
      body: body !== undefined && body !== null ? JSON.stringify(body) : undefined,
    });
    let data = {};
    const txt = await res.text();
    try { data = JSON.parse(txt); } catch (_) {}
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, status: 0, data: { message: '네트워크 오류: ' + e.message } };
  }
}

let toastTimer;
function toast(msg, isErr = false) {
  const el = $('toast');
  el.textContent = msg;
  el.className = isErr ? 'show err' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2400);
}

function confirm2(msg) { return confirm(msg); }

function paginate(meta, page, fn) {
  if (!meta?.totalPages || meta.totalPages <= 1) return '';
  const prev = page > 1 ? `<button class="btn btn-ghost btn-sm" onclick="${fn}(${page-1})">이전</button>` : '';
  const next = page < meta.totalPages ? `<button class="btn btn-ghost btn-sm" onclick="${fn}(${page+1})">다음</button>` : '';
  return `<div class="pagination">${prev}<span>${page} / ${meta.totalPages} 페이지 &nbsp;(총 ${meta.totalCount ?? 0}건)</span>${next}</div>`;
}

// ─── Auth ─────────────────────────────────────────────────────────────
async function doLogin() {
  const email = $('l-email').value.trim();
  const pw    = $('l-pw').value;
  const btn   = $('l-btn');
  const err   = $('l-err');
  err.className = 'err-msg';
  if (!email || !pw) { err.textContent = '이메일과 비밀번호를 입력해주세요.'; err.className = 'err-msg show'; return; }
  btn.disabled = true; btn.textContent = '로그인 중…';
  const { ok, data } = await api('POST', '/auth/admin/login', { email, password: pw }, false);
  btn.disabled = false; btn.textContent = '로그인';
  if (ok) {
    token = data.accessToken;
    me    = data.user;
    $('view-login').hidden = true;
    $('view-app').hidden   = false;
    $('sb-user').textContent = me.email;
    nav('users');
  } else {
    err.textContent = data.message || '로그인 실패';
    err.className = 'err-msg show';
  }
}

async function doLogout() {
  await api('POST', '/auth/logout', null).catch(() => {});
  token = me = null;
  $('view-app').hidden   = true;
  $('view-login').hidden = false;
}

// ─── Navigation ───────────────────────────────────────────────────────
const sections = { users, channels, contents, categories, points, xp, password };

function nav(sec) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sec === sec);
  });
  sections[sec]?.();
}

// ─── Users ────────────────────────────────────────────────────────────
async function users(page = 1) {
  $('main').innerHTML = loading();
  const { ok, data } = await api('GET', `/users?page=${page}&limit=20`);
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }

  const rows = (data.data || []).map(u => `
    <tr>
      <td class="td-mono">${h(u.id)}</td>
      <td>${h(u.nickname || '-')}</td>
      <td>${h(u.email || '-')}</td>
      <td><span class="badge badge-${u.type}">${u.type === 'admin' ? '어드민' : '멤버'}</span></td>
      <td><span class="badge badge-${u.status === 'active' ? 'on' : 'off'}">${u.status}</span></td>
      <td>${fmtDate(u.createdAt)}</td>
      <td class="td-actions">
        ${u.type === 'member'
          ? `<button class="btn btn-primary btn-sm" onclick="changeRole('${u.id}','admin')">어드민 승격</button>`
          : `<button class="btn btn-ghost btn-sm"   onclick="changeRole('${u.id}','member')">멤버 강등</button>`}
      </td>
    </tr>`).join('') || `<tr><td colspan="7" class="empty-row">유저가 없습니다.</td></tr>`;

  $('main').innerHTML = `
    <div class="sec-header"><div class="sec-title">유저 관리</div></div>
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th>닉네임</th><th>이메일</th><th>타입</th><th>상태</th><th>가입일</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${paginate(data.meta, page, 'users')}`;
}

async function changeRole(id, type) {
  if (!confirm2(`${type === 'admin' ? '어드민으로 승격' : '멤버로 강등'}하시겠습니까?`)) return;
  const { ok, data } = await api('PATCH', `/users/${id}/role`, { type });
  ok ? (toast('변경되었습니다.'), users()) : toast(data.message || '실패', true);
}

// ─── Channels ─────────────────────────────────────────────────────────
async function channels(mode) {
  $('main').innerHTML = loading();
  const { ok, data } = await api('GET', '/channels');
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }
  channelCache = data.data || [];

  const rows = channelCache.map(c => `
    <tr>
      <td class="td-mono">${h(c.id)}</td>
      <td>${h(c.name)}</td>
      <td class="td-mono">${h(c.youtubeChannelId)}</td>
      <td>${fmtDate(c.addedAt)}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm"  onclick="channels('edit:${c.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delChannel('${c.id}')">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="5" class="empty-row">채널이 없습니다.</td></tr>`;

  let formHtml = '';
  if (mode === 'new') {
    formHtml = channelForm(null);
  } else if (typeof mode === 'string' && mode.startsWith('edit:')) {
    const id = mode.slice(5);
    const ch = channelCache.find(c => c.id === id);
    if (ch) formHtml = channelForm(ch);
  }

  $('main').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">채널 관리</div>
      ${!mode ? `<button class="btn btn-primary" onclick="channels('new')">+ 채널 등록</button>` : ''}
    </div>
    ${formHtml}
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th>채널명</th><th>유튜브 채널 ID</th><th>등록일</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function channelForm(c) {
  const isEdit = !!c;
  return `
    <div class="form-card">
      <h3>${isEdit ? '채널 수정' : '채널 등록'}</h3>
      <div class="form-row col-2">
        <div class="field"><label>채널명</label><input id="ch-name" value="${h(c?.name)}"></div>
        ${!isEdit ? `<div class="field"><label>유튜브 채널 ID</label><input id="ch-ytid" value=""></div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveChannel(${isEdit ? `'${c.id}'` : 'null'})">${isEdit ? '저장' : '등록'}</button>
        <button class="btn btn-ghost"   onclick="channels()">취소</button>
      </div>
    </div>`;
}

async function saveChannel(id) {
  const name  = $('ch-name')?.value.trim();
  if (!name) { toast('채널명을 입력해주세요.', true); return; }
  if (!id) {
    const ytid = $('ch-ytid')?.value.trim();
    if (!ytid) { toast('유튜브 채널 ID를 입력해주세요.', true); return; }
    const { ok, data } = await api('POST', '/channels', { name, youtubeChannelId: ytid });
    ok ? (toast('채널이 등록되었습니다.'), channels()) : toast(data.message || '실패', true);
  } else {
    const { ok, data } = await api('PATCH', `/channels/${id}`, { name });
    ok ? (toast('수정되었습니다.'), channels()) : toast(data.message || '실패', true);
  }
}

async function delChannel(id) {
  if (!confirm2('채널을 삭제하시겠습니까?')) return;
  const { ok, data } = await api('DELETE', `/channels/${id}`);
  ok ? (toast('삭제되었습니다.'), channels()) : toast(data.message || '실패', true);
}

// ─── Contents ─────────────────────────────────────────────────────────
let contentCache = [];

async function contents(mode, page = 1) {
  $('main').innerHTML = loading();
  if (!channelCache.length) {
    const r = await api('GET', '/channels');
    channelCache = r.data?.data || [];
  }
  const { ok, data } = await api('GET', `/contents?page=${page}&limit=20`);
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }
  contentCache = data.data || [];

  const chOpts = channelCache.map(c => `<option value="${h(c.id)}">${h(c.name)}</option>`).join('');

  const rows = contentCache.map(c => `
    <tr>
      <td class="td-mono">${h(c.id)}</td>
      <td>${h(c.name)}</td>
      <td>${h(c.type)}</td>
      <td>${h(c.interests || '-')}</td>
      <td>${h(c.channel?.name || '-')}</td>
      <td style="text-align:center">${c.sortOrder ?? '-'}</td>
      <td style="text-align:center"><span class="badge badge-${c.pointApplyable ? 'on' : 'off'}">${c.pointApplyable ? 'Y' : 'N'}</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm"  onclick="contents('edit:${c.id}',${page})">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delContent('${c.id}',${page})">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="8" class="empty-row">콘텐츠가 없습니다.</td></tr>`;

  let formHtml = '';
  if (mode === 'new') {
    formHtml = contentForm(null, chOpts);
  } else if (typeof mode === 'string' && mode.startsWith('edit:')) {
    const id = mode.slice(5);
    const ct = contentCache.find(c => c.id === id);
    if (ct) formHtml = contentForm(ct, chOpts);
  }

  $('main').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">콘텐츠 관리</div>
      ${!mode ? `<button class="btn btn-primary" onclick="contents('new',${page})">+ 콘텐츠 등록</button>` : ''}
    </div>
    ${formHtml}
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th>이름</th><th>타입</th><th>관심사</th><th>채널</th><th>순서</th><th>포인트</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${paginate(data.meta, page, 'contents')}`;
}

function contentForm(c, chOpts) {
  const isEdit = !!c;
  const selCh  = channelCache.map(ch =>
    `<option value="${h(ch.id)}" ${c?.channel?.id === ch.id ? 'selected' : ''}>${h(ch.name)}</option>`).join('');
  return `
    <div class="form-card">
      <h3>${isEdit ? '콘텐츠 수정' : '콘텐츠 등록'}</h3>
      <div class="form-row col-3">
        <div class="field"><label>이름</label><input id="ct-name" value="${h(c?.name)}"></div>
        ${!isEdit ? `
          <div class="field"><label>채널</label>
            <select id="ct-channel"><option value="">채널 선택</option>${chOpts}</select>
          </div>
          <div class="field"><label>유튜브 비디오 ID</label><input id="ct-ytid" value=""></div>
        ` : `<div></div><div></div>`}
      </div>
      <div class="form-row col-3">
        ${!isEdit ? `
          <div class="field"><label>타입</label>
            <select id="ct-type">
              <option value="symbol">튜토리얼 (symbol)</option>
              <option value="free">무료 도안 (free)</option>
            </select>
          </div>
          <div class="field"><label>관심사</label>
            <select id="ct-interests">
              <option value="">없음</option>
              <option value="crochet">코바늘</option>
              <option value="knitting">대바늘</option>
            </select>
          </div>
        ` : `<div></div><div></div>`}
        <div class="field"><label>정렬 순서</label><input id="ct-order" type="number" value="${c?.sortOrder ?? ''}"></div>
      </div>
      <div class="form-row">
        <label class="check-field" style="padding-top:0">
          <input id="ct-point" type="checkbox" ${c?.pointApplyable ? 'checked' : ''}> 포인트 지급
        </label>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveContent(${isEdit ? `'${c.id}'` : 'null'})">${isEdit ? '저장' : '등록'}</button>
        <button class="btn btn-ghost"   onclick="contents()">취소</button>
      </div>
    </div>`;
}

async function saveContent(id) {
  const name         = $('ct-name')?.value.trim();
  const sortOrderVal = $('ct-order')?.value;
  const pointApplyable = $('ct-point')?.checked ?? false;
  if (!name) { toast('이름을 입력해주세요.', true); return; }
  if (!id) {
    const channelId     = $('ct-channel')?.value;
    const youtubeVideoId = $('ct-ytid')?.value.trim();
    const type          = $('ct-type')?.value;
    const interests     = $('ct-interests')?.value || undefined;
    if (!channelId)      { toast('채널을 선택해주세요.', true); return; }
    if (!youtubeVideoId) { toast('유튜브 비디오 ID를 입력해주세요.', true); return; }
    const body = { channelId, youtubeVideoId, name, type, pointApplyable };
    if (interests)     body.interests  = interests;
    if (sortOrderVal)  body.sortOrder  = Number(sortOrderVal);
    const { ok, data } = await api('POST', '/contents', body);
    ok ? (toast('콘텐츠가 등록되었습니다.'), contents()) : toast(data.message || '실패', true);
  } else {
    const body = { name, pointApplyable };
    if (sortOrderVal !== '') body.sortOrder = sortOrderVal ? Number(sortOrderVal) : null;
    const { ok, data } = await api('PATCH', `/contents/${id}`, body);
    ok ? (toast('수정되었습니다.'), contents()) : toast(data.message || '실패', true);
  }
}

async function delContent(id, page) {
  if (!confirm2('콘텐츠를 삭제하시겠습니까?')) return;
  const { ok, data } = await api('DELETE', `/contents/${id}`);
  ok ? (toast('삭제되었습니다.'), contents(null, page)) : toast(data.message || '실패', true);
}

// ─── Categories ───────────────────────────────────────────────────────
let catCache = [];

async function categories(mode) {
  $('main').innerHTML = loading();
  const { ok, data } = await api('GET', '/boards/categories');
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }
  catCache = data.data || [];

  const rows = catCache.map(c => `
    <tr>
      <td class="td-mono">${h(c.id)}</td>
      <td>${h(c.label)}</td>
      <td><span class="badge badge-${c.status}">${c.status === 'enabled' ? '활성' : '비활성'}</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm"  onclick="categories('edit:${c.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delCategory('${c.id}')">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="4" class="empty-row">카테고리가 없습니다.</td></tr>`;

  let formHtml = '';
  if (mode === 'new') {
    formHtml = catForm(null);
  } else if (typeof mode === 'string' && mode.startsWith('edit:')) {
    const c = catCache.find(x => x.id === mode.slice(5));
    if (c) formHtml = catForm(c);
  }

  $('main').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">카테고리 관리</div>
      ${!mode ? `<button class="btn btn-primary" onclick="categories('new')">+ 카테고리 추가</button>` : ''}
    </div>
    ${formHtml}
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th>이름</th><th>상태</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function catForm(c) {
  const isEdit = !!c;
  return `
    <div class="form-card">
      <h3>${isEdit ? '카테고리 수정' : '카테고리 추가'}</h3>
      <div class="form-row col-2">
        <div class="field"><label>이름</label><input id="cat-label" value="${h(c?.label)}"></div>
        ${isEdit ? `
          <div class="field"><label>상태</label>
            <select id="cat-status">
              <option value="enabled"  ${c.status === 'enabled'  ? 'selected' : ''}>활성</option>
              <option value="disabled" ${c.status === 'disabled' ? 'selected' : ''}>비활성</option>
            </select>
          </div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveCategory(${isEdit ? `'${c.id}'` : 'null'})">${isEdit ? '저장' : '추가'}</button>
        <button class="btn btn-ghost"   onclick="categories()">취소</button>
      </div>
    </div>`;
}

async function saveCategory(id) {
  const label = $('cat-label')?.value.trim();
  if (!label) { toast('카테고리명을 입력해주세요.', true); return; }
  if (!id) {
    const { ok, data } = await api('POST', '/boards/categories', { label });
    ok ? (toast('카테고리가 추가되었습니다.'), categories()) : toast(data.message || '실패', true);
  } else {
    const status = $('cat-status')?.value;
    const { ok, data } = await api('PATCH', `/boards/categories/${id}`, { label, status });
    ok ? (toast('수정되었습니다.'), categories()) : toast(data.message || '실패', true);
  }
}

async function delCategory(id) {
  if (!confirm2('카테고리를 삭제하시겠습니까?')) return;
  const { ok, data } = await api('DELETE', `/boards/categories/${id}`);
  ok ? (toast('삭제되었습니다.'), categories()) : toast(data.message || '실패', true);
}

// ─── Points ───────────────────────────────────────────────────────────
let pointCache = [];

async function points(mode) {
  $('main').innerHTML = loading();
  const { ok, data } = await api('GET', '/points/policies');
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }
  pointCache = data.data || [];

  const rows = pointCache.map(p => `
    <tr>
      <td class="td-mono">${h(p.id)}</td>
      <td>${h(p.actionType)}</td>
      <td style="text-align:right">${p.pointAmount}</td>
      <td style="text-align:center">${p.isOneTime ? 'Y' : 'N'}</td>
      <td><span class="badge badge-${p.isActive ? 'on' : 'off'}">${p.isActive ? '활성' : '비활성'}</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm"  onclick="points('edit:${p.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delPoint('${p.id}')">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-row">정책이 없습니다.</td></tr>`;

  let formHtml = '';
  if (mode === 'new') {
    formHtml = pointForm(null);
  } else if (typeof mode === 'string' && mode.startsWith('edit:')) {
    const p = pointCache.find(x => x.id === mode.slice(5));
    if (p) formHtml = pointForm(p);
  }

  $('main').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">포인트 정책 관리</div>
      ${!mode ? `<button class="btn btn-primary" onclick="points('new')">+ 정책 추가</button>` : ''}
    </div>
    ${formHtml}
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th>액션 타입</th><th style="text-align:right">포인트</th><th style="text-align:center">일회성</th><th>상태</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function pointForm(p) {
  const isEdit = !!p;
  return `
    <div class="form-card">
      <h3>${isEdit ? '정책 수정' : '정책 추가'}</h3>
      <div class="form-row col-3">
        ${!isEdit ? `
          <div class="field"><label>액션 타입</label>
            <select id="pt-action">
              <option value="WATCH">WATCH — 콘텐츠 시청</option>
              <option value="CHALLENGE">CHALLENGE — 챌린지 완료</option>
              <option value="COMMENT">COMMENT — 댓글 작성</option>
            </select>
          </div>` : ''}
        <div class="field"><label>포인트</label><input id="pt-amount" type="number" min="0" value="${p?.pointAmount ?? ''}"></div>
        ${!isEdit ? `<label class="check-field"><input id="pt-onetime" type="checkbox"> 일회성</label>` : ''}
        <label class="check-field"><input id="pt-active" type="checkbox" ${p?.isActive !== false ? 'checked' : ''}> 활성</label>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="savePoint(${isEdit ? `'${p.id}'` : 'null'})">${isEdit ? '저장' : '추가'}</button>
        <button class="btn btn-ghost"   onclick="points()">취소</button>
      </div>
    </div>`;
}

async function savePoint(id) {
  const amount   = Number($('pt-amount')?.value);
  const isActive = $('pt-active')?.checked ?? true;
  if (!amount && amount !== 0) { toast('포인트를 입력해주세요.', true); return; }
  if (!id) {
    const actionType = $('pt-action')?.value;
    const isOneTime  = $('pt-onetime')?.checked ?? false;
    const { ok, data } = await api('POST', '/points/policies', { actionType, pointAmount: amount, isOneTime, isActive });
    ok ? (toast('정책이 추가되었습니다.'), points()) : toast(data.message || '실패', true);
  } else {
    const { ok, data } = await api('PATCH', `/points/policies/${id}`, { pointAmount: amount, isActive });
    ok ? (toast('수정되었습니다.'), points()) : toast(data.message || '실패', true);
  }
}

async function delPoint(id) {
  if (!confirm2('포인트 정책을 삭제하시겠습니까?')) return;
  const { ok, data } = await api('DELETE', `/points/policies/${id}`);
  ok ? (toast('삭제되었습니다.'), points()) : toast(data.message || '실패', true);
}

// ─── XP ───────────────────────────────────────────────────────────────
let xpCache = [];

async function xp(mode) {
  $('main').innerHTML = loading();
  const { ok, data } = await api('GET', '/xp/levels');
  if (!ok) { $('main').innerHTML = errHtml(data.message); return; }
  xpCache = (data.data || []).sort((a, b) => a.level - b.level);

  const rows = xpCache.map(x => `
    <tr>
      <td class="td-mono">${h(x.id)}</td>
      <td style="text-align:center">${x.level}</td>
      <td>${h(x.label)}</td>
      <td style="text-align:right">${x.xpThreshold}</td>
      <td><span class="badge badge-${x.isActive ? 'on' : 'off'}">${x.isActive ? '활성' : '비활성'}</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm"  onclick="xp('edit:${x.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delXp('${x.id}')">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="6" class="empty-row">레벨 정책이 없습니다.</td></tr>`;

  let formHtml = '';
  if (mode === 'new') {
    formHtml = xpForm(null);
  } else if (typeof mode === 'string' && mode.startsWith('edit:')) {
    const x2 = xpCache.find(x => x.id === mode.slice(5));
    if (x2) formHtml = xpForm(x2);
  }

  $('main').innerHTML = `
    <div class="sec-header">
      <div class="sec-title">XP 레벨 정책 관리</div>
      ${!mode ? `<button class="btn btn-primary" onclick="xp('new')">+ 레벨 추가</button>` : ''}
    </div>
    ${formHtml}
    <div class="table-card">
      <table>
        <thead><tr><th>ID</th><th style="text-align:center">레벨</th><th>레벨명</th><th style="text-align:right">XP 임계값</th><th>상태</th><th>액션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function xpForm(x) {
  const isEdit = !!x;
  return `
    <div class="form-card">
      <h3>${isEdit ? '레벨 수정' : '레벨 추가'}</h3>
      <div class="form-row col-3">
        ${!isEdit ? `<div class="field"><label>레벨 번호</label><input id="xp-lv" type="number" min="1" value="${x?.level ?? ''}"></div>` : ''}
        <div class="field"><label>레벨명</label><input id="xp-label" value="${h(x?.label)}"></div>
        <div class="field"><label>XP 임계값</label><input id="xp-thr" type="number" min="0" value="${x?.xpThreshold ?? ''}"></div>
        <label class="check-field"><input id="xp-active" type="checkbox" ${x?.isActive !== false ? 'checked' : ''}> 활성</label>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveXp(${isEdit ? `'${x.id}'` : 'null'})">${isEdit ? '저장' : '추가'}</button>
        <button class="btn btn-ghost"   onclick="xp()">취소</button>
      </div>
    </div>`;
}

async function saveXp(id) {
  const label   = $('xp-label')?.value.trim();
  const thr     = $('xp-thr')?.value;
  const isActive = $('xp-active')?.checked ?? true;
  if (!label)        { toast('레벨명을 입력해주세요.', true); return; }
  if (thr === '')    { toast('XP 임계값을 입력해주세요.', true); return; }
  if (!id) {
    const level = Number($('xp-lv')?.value);
    if (!level) { toast('레벨 번호를 입력해주세요.', true); return; }
    const { ok, data } = await api('POST', '/xp/levels', { level, xpThreshold: Number(thr), label, isActive });
    ok ? (toast('레벨이 추가되었습니다.'), xp()) : toast(data.message || '실패', true);
  } else {
    const { ok, data } = await api('PATCH', `/xp/levels/${id}`, { xpThreshold: Number(thr), label, isActive });
    ok ? (toast('수정되었습니다.'), xp()) : toast(data.message || '실패', true);
  }
}

async function delXp(id) {
  if (!confirm2('XP 레벨 정책을 삭제하시겠습니까?')) return;
  const { ok, data } = await api('DELETE', `/xp/levels/${id}`);
  ok ? (toast('삭제되었습니다.'), xp()) : toast(data.message || '실패', true);
}

// ─── Password ─────────────────────────────────────────────────────────
function password() {
  $('main').innerHTML = `
    <div class="sec-header"><div class="sec-title">비밀번호 변경</div></div>
    <div class="form-card" style="max-width:460px">
      <div class="form-row" style="grid-template-columns:1fr">
        <div class="field"><label>현재 비밀번호</label><input id="pw-cur" type="password"></div>
        <div class="field"><label>새 비밀번호</label><input id="pw-new" type="password"></div>
        <div class="field"><label>새 비밀번호 확인</label><input id="pw-confirm" type="password"></div>
      </div>
      <div id="pw-err" class="err-msg"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="savePassword()">변경</button>
      </div>
    </div>`;
}

async function savePassword() {
  const cur     = $('pw-cur').value;
  const nw      = $('pw-new').value;
  const confirm3 = $('pw-confirm').value;
  const err     = $('pw-err');
  err.className = 'err-msg';
  if (!cur || !nw)   { err.textContent = '모든 필드를 입력해주세요.'; err.className = 'err-msg show'; return; }
  if (nw.length < 8) { err.textContent = '새 비밀번호는 8자 이상이어야 합니다.'; err.className = 'err-msg show'; return; }
  if (nw !== confirm3) { err.textContent = '새 비밀번호가 일치하지 않습니다.'; err.className = 'err-msg show'; return; }
  const { ok, data } = await api('PATCH', '/auth/admin/change-password', { currentPassword: cur, newPassword: nw });
  if (ok) {
    toast('비밀번호가 변경되었습니다.');
    $('pw-cur').value = $('pw-new').value = $('pw-confirm').value = '';
  } else {
    err.textContent = data.message || '실패'; err.className = 'err-msg show';
  }
}

// ─── Misc ─────────────────────────────────────────────────────────────
function loading() { return '<p style="color:#aaa;padding:48px 0;text-align:center">불러오는 중…</p>'; }
function errHtml(msg) { return `<p style="color:#ef4444;padding:48px 0;text-align:center">${h(msg)}</p>`; }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('ko') : '-'; }

// ─── Init ─────────────────────────────────────────────────────────────
$('l-email').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
$('l-pw').addEventListener('keydown',    e => e.key === 'Enter' && doLogin());
</script>
